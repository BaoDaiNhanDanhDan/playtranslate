# Robolectric instruments unit tests against this Android SDK.
#
# Pinned to 34 (Android 14) because the project's unit-test toolchain is JDK 17,
# while Robolectric's SDK-36 sandbox requires Java 21 ("Android SDK 36 requires
# Java 21"). SDK 34 runs on Java 17 and its android-all jar is already cached.
# The pinned SDK only changes which framework stubs tests run against — it does
# not affect app behavior. Bump to 36 once the unit-test toolchain moves to Java 21.
sdk=34
